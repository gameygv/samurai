e":"governance/backlog.md","content":"Eliminaci\u00f3n de integraci\u00f3n Kommo - Planned"},{"id":"epic-e4","type":"epic","source_file":"governance/backlog.md","content":"Mejoras de Knowledge Base y contexto IA - Planned"},{"id":"guardrail-must-cq-01","type":"guardrail","source_file":"governance/guardrails.md","content":"[must] TypeScript estricto en frontend \u2014 usar tipos expl\u00edcitos, no `any` \u2014 Verify: npx tsc --noEmit"},{"id":"guardrail-must-cq-02","type":"guardrail","source_file":"governance/guardrails.md","content":"[must] Componentes React < 100 l\u00edneas, un archivo por componente \u2014 Verify: Code review"},{"id":"guardrail-must-cq-03","type":"guardrail","source_file":"governance/guardrails.md","content":"[must] Usar shadcn/ui como librer\u00eda de componentes base \u2014 Verify: Code review"},{"id":"guardrail-must-cq-04","type":"guardrail","source_file":"governance/guardrails.md","content":"[must] Tailwind CSS para todo el styling \u2014 no CSS custom \u2014 Verify: Code review"},{"id":"guardrail-should-cq-05","type":"guardrail","source_file":"governance/guardrails.md","content":"[should] Rutas definidas en src/App.tsx \u2014 no routing distribuido \u2014 Verify: Code review"},{"id":"guardrail-must-ar-01","type":"guardrail","source_file":"governance/guardrails.md","content":"[must] Backend exclusivamente en Supabase Edge Functions (Deno) \u2014 Verify: Deployment check"},{"id":"guardrail-must-ar-02","type":"guardrail","source_file":"governance/guardrails.md","content":"[must] Datos PII hasheados con SHA-256 antes de enviar a Meta CAPI \u2014 Verify: Unit test"},{"id":"guardrail-must-ar-03","type":"guardrail","source_file":"governance/guardrails.md","content":"[must] Leads nuevos protegidos 24h \u2014 no asignar PERDIDO autom\u00e1ticamente \u2014 Verify: Edge function logic"},{"id":"guardrail-should-ar-04","type":"guardrail","source_file":"governance/guardrails.md","content":"[should] Edge functions deben usar _shared/cors.ts para headers CORS \u2014 Verify: Code review"},{"id":"guardrail-should-ar-05","type":"guardrail","source_file":"governance/guardrails.md","content":"[should] Supabase client inicializado desde src/integrations/supabase/client.ts \u2014 no instancias duplicadas \u2014 Verify: Grep check"},{"id":"guardrail-must-se-01","type":"guardrail","source_file":"governance/guardrails.md","content":"[must] API keys y secrets en app_config (categor\u00eda SECRETS), nunca hardcoded en c\u00f3digo \u2014 Verify: Grep check"},{"id":"guardrail-must-se-02","type":"guardrail","source_file":"governance/guardrails.md","content":"[must] RLS habilitado en todas las tablas de Supabase \u2014 Verify: DB audit"},{"id":"guardrail-should-se-03","type":"guardrail","source_file":"governance/guardrails.md","content":"[should] Role-based access control en rutas del frontend \u2014 Verify: Code review"},{"id":"guardrail-must-ai-01","type":"guardrail","source_file":"governance/guardrails.md","content":"[must] Instrucciones #CIA siempre vinculadas a contexto de chat \u2014 nunca gen\u00e9ricas \u2014 Verify: UI enforcement"},{"id":"guardrail-must-ai-02","type":"guardrail","source_file":"governance/guardrails.md","content":"[must] Jerarqu\u00eda de verdad: Layer 1 (#CIA) > Layer 3 (Website Content) para datos t\u00e9cnicos \u2014 Verify: Prompt review"},{"id":"guardrail-should-ai-03","type":"guardrail","source_file":"governance/guardrails.md","content":"[should] Prompt versions snapshotted antes de modificar \u2014 Verify: Edge function logic"},{"id":"BASE-001","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"TDD cycle: RED (failing test) \u2192 GREEN (minimal pass) \u2192 REFACTOR (clean up). No exceptions. Tests are specification, not afterthought.","category":"tdd","tags":["tdd","testing","workflow","discipline"],"learned_from":""},{"id":"BASE-002","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Commit after each completed task, not just at story end. Enables recovery, shows progress, creates clean history for debugging.","category":"git","tags":["git","commits","discipline","workflow"],"learned_from":""},{"id":"BASE-003","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Full skill cycle even for small stories \u2014 the overhead is minimal and structure helps. Design \u2192 Plan \u2192 Implement \u2192 Review \u2192 Close.","category":"skills","tags":["skills","lifecycle","discipline","velocity"],"learned_from":""},{"id":"BASE-004","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Ask before spawning subagents (inference economy). Gather with tools, think with inference. AI computation is a resource to steward.","category":"subagents","tags":["subagents","inference","economy","permission"],"learned_from":""},{"id":"BASE-005","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"HITL (Human In The Loop) is default. Pause after significant work for review. Slow is smooth, smooth is fast.","category":"hitl","tags":["hitl","collaboration","review","observability"],"learned_from":""},{"id":"BASE-006","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Design-first eliminates ambiguity. Concrete examples in specs enable direct implementation without guessing intent.","category":"design","tags":["design","specification","clarity","planning"],"learned_from":""},{"id":"BASE-007","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Story branch and scope commit required before implementation. Branch from development branch, merge back after close. This enforces traceability.","category":"git","tags":["git","branches","story","scope","lifecycle"],"learned_from":""},{"id":"BASE-008","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Epics are logical containers (directory + tracker), not branches. Stories branch directly from the development branch. No epic branches.","category":"git","tags":["git","branches","epic","model","lifecycle"],"learned_from":""},{"id":"BASE-009","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Retrospective required before story/epic close. Extract learnings, update patterns. Kaizen, one story at a time.","category":"retrospective","tags":["retrospective","review","kaizen","learning","lifecycle"],"learned_from":""},{"id":"BASE-010","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Epic close with retrospective before merge to development branch. Captures learning at meso-layer between stories and quarters.","category":"epic","tags":["epic","close","retrospective","merge","lifecycle"],"learned_from":""},{"id":"BASE-011","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Direct communication, no praise-padding. 'Great question!' adds no value. Say what needs saying, then stop.","category":"communication","tags":["communication","directness","efficiency","style"],"learned_from":""},{"id":"BASE-012","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Redirect when dispersing (with permission). Tangents go to parking lot. Return to stated goal.","category":"focus","tags":["focus","tangents","parking-lot","redirection"],"learned_from":""},{"id":"BASE-013","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Epistemological rigor: triangulate claims (2+ sources), explicit confidence levels, acknowledge contrary evidence. Stand on shoulders of giants.","category":"research","tags":["research","epistemology","evidence","confidence","rigor"],"learned_from":""},{"id":"BASE-014","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Honesty over agreement. Push back on bad ideas. Admit uncertainty rather than pretend confidence. Your judgment is the quality gate.","category":"honesty","tags":["honesty","pushback","uncertainty","values"],"learned_from":""},{"id":"BASE-015","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Type annotations on all code. Function parameters, return types, class attributes. Pyright strict mode is the standard.","category":"typing","tags":["typing","pyright","annotations","quality"],"learned_from":""},{"id":"BASE-016","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Pydantic models for all data structures. Not dict, not TypedDict. Validation at boundaries, serialization for free.","category":"pydantic","tags":["pydantic","models","validation","schemas"],"learned_from":""},{"id":"BASE-017","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Simple heuristics over complex ML. Keyword matching is 98% accurate. Token estimate = words \u00d7 1.3. Complexity must earn its place.","category":"simplicity","tags":["simplicity","heuristics","pragmatism","yagni"],"learned_from":""},{"id":"BASE-018","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Tests alongside implementation, not after. Write the test, watch it fail, make it pass. Catches issues immediately.","category":"testing","tags":["testing","tdd","implementation","workflow"],"learned_from":""},{"id":"BASE-019","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Skills + Toolkit over Engines. Users need flexibility (skills as process guides) + determinism (CLI for data operations).","category":"architecture","tags":["architecture","skills","toolkit","flexibility"],"learned_from":""},{"id":"BASE-020","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Jidoka: stop on defects. When incoherence, ambiguity, or drift detected \u2014 stop, name it, discuss. Don't accumulate errors.","category":"jidoka","tags":["jidoka","quality","defects","lean"],"learned_from":""},{"id":"BASE-021","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Task granularity should match story complexity \u2014 over-decomposing simple stories wastes planning overhead, while under-decomposing complex ones hides risk.","category":"planning","tags":["planning","decomposition","estimation","discipline"],"learned_from":""},{"id":"BASE-022","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Research before building: for unfamiliar APIs, architectural decisions, or foundational choices, invest 15 minutes of research before writing code \u2014 it saves hours of rework.","category":"research","tags":["research","preparation","efficiency","discipline"],"learned_from":""},{"id":"BASE-023","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Pre-implementation architecture review (~5-10 min) catches scope gaps, design duplication, and proportionality issues when the cost of change is zero.","category":"architecture","tags":["architecture","review","prevention","quality"],"learned_from":""},{"id":"BASE-024","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Verify existing implementation before coding \u2014 features may already be done from prior work. Check before building.","category":"verification","tags":["verification","waste","duplication","discipline"],"learned_from":""},{"id":"BASE-025","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Risk-first ordering: validate risky assumptions early, reorder by uncertainty not dependency.","category":"risk","tags":["risk","planning","ordering","strategy"],"learned_from":""},{"id":"BASE-026","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Repetitive extractions compound: 1st establishes pattern, 2nd refines, 3rd is mechanical. Plan decompositions that exploit compounding velocity.","category":"extraction","tags":["extraction","velocity","compounding","planning"],"learned_from":""},{"id":"BASE-027","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"When skipping lifecycle phases, state the skip decision explicitly with rationale \u2014 silent skips create process opacity.","category":"lifecycle","tags":["lifecycle","transparency","decisions","discipline"],"learned_from":""},{"id":"BASE-028","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Momentum trap: quick wins create flow that bypasses process for subsequent work \u2014 pause after each completion and consciously re-engage the full lifecycle.","category":"momentum","tags":["momentum","discipline","flow","lifecycle"],"learned_from":""},{"id":"BASE-029","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Quality review catches what automation misses: type lies, test muda, silent duplicates \u2014 embed as mandatory plan task, not optional human gate.","category":"quality","tags":["quality","review","automation","discipline"],"learned_from":""},{"id":"BASE-030","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Fixed coverage gates create Goodhart dynamics \u2014 use coverage as diagnostic, not gate. Cover deltas, not thresholds.","category":"testing","tags":["testing","coverage","metrics","quality"],"learned_from":""},{"id":"BASE-031","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Dogfooding is the highest-fidelity validation \u2014 simulate the end-user journey, not just component tests.","category":"validation","tags":["validation","dogfooding","testing","quality"],"learned_from":""},{"id":"BASE-032","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Bug report mechanism is not root cause: go to code (Genchi Genbutsu) before forming the fix hypothesis.","category":"debugging","tags":["debugging","root-cause","lean","discipline"],"learned_from":""},{"id":"BASE-033","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Infrastructure without wiring recurs: always trace from entry point to implementation to verify the code path is actually connected.","category":"integration","tags":["integration","wiring","verification","architecture"],"learned_from":""},{"id":"BASE-034","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Concrete design examples (copy-pasteable code with correct types) reduce implementation friction to near-mechanical \u2014 but review examples for consistency since design bugs propagate.","category":"design","tags":["design","examples","specification","quality"],"learned_from":""},{"id":"BASE-035","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Interactive design sessions where the user asks 'why?' produce fundamentally better architectures than pre-baked decisions.","category":"design","tags":["design","collaboration","architecture","quality"],"learned_from":""},{"id":"BASE-036","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Eliminate before optimize: first ask 'can we remove this entirely?' before 'how do we make this smaller?'","category":"simplicity","tags":["simplicity","optimization","waste","lean"],"learned_from":""},{"id":"BASE-037","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Compliance math: p(all) \u2248 p(each)^n. Halving instruction count can quadruple full compliance probability. Fewer, stronger rules beat many weak rules.","category":"compliance","tags":["compliance","rules","simplicity","probability"],"learned_from":""},{"id":"BASE-038","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Patch at source module, not import location \u2014 mock where the function is defined, not where it's imported, to avoid test fragility across refactors.","category":"testing","tags":["testing","mocking","python","refactoring"],"learned_from":""},{"id":"BASE-039","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Consumer-side validation (poka-yoke) is the cheapest defense against integration errors: validate what you receive, don't trust the shared path.","category":"validation","tags":["validation","poka-yoke","integration","quality"],"learned_from":""},{"id":"BASE-040","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Two-phase CLI pattern for destructive operations: check (read-only) then action (with --dry-run preview and HITL confirmation).","category":"cli","tags":["cli","destructive","safety","pattern"],"learned_from":""},{"id":"BASE-041","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Schema evolution without versioning causes silent breakage across execution contexts \u2014 Literal types in serialization boundaries are time bombs.","category":"schema","tags":["schema","versioning","serialization","evolution"],"learned_from":""},{"id":"BASE-042","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Bare except/generic error handling masks import errors, type errors, and real bugs \u2014 always log the actual exception at debug level minimum.","category":"error-handling","tags":["error-handling","exceptions","debugging","quality"],"learned_from":""},{"id":"BASE-043","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Test assertions must verify semantic content, not just exit codes or structural properties \u2014 exit_code != 0 passes for both 'command not found' and 'validation error'.","category":"testing","tags":["testing","assertions","semantics","quality"],"learned_from":""},{"id":"BASE-044","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Protocol signatures must match implementations exactly \u2014 runtime_checkable only checks method existence, not signatures or sync/async distinction.","category":"protocols","tags":["protocols","typing","python","contracts"],"learned_from":""},{"id":"BASE-045","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"CLI should delegate defaults to library layer, not duplicate them \u2014 drift between two sources of truth causes silent bugs.","category":"cli","tags":["cli","defaults","delegation","architecture"],"learned_from":""},{"id":"BASE-046","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Silent data drops are semantic bugs: when sync/upsert operations skip items, always report the skip count in the response.","category":"sync","tags":["sync","data-integrity","observability","quality"],"learned_from":""},{"id":"BASE-047","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"3-tier config loading (built-in, project, user; last-wins) is the robust extensibility pattern for CLI tools \u2014 mirrors git config and XDG.","category":"config","tags":["config","tiers","extensibility","pattern"],"learned_from":""},{"id":"BASE-048","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Separation of concerns at integration boundaries: CLI owns domain concepts, adapter owns platform specifics.","category":"separation","tags":["separation","integration","adapter","architecture"],"learned_from":""},{"id":"BASE-049","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Dependency placement: protocols in core packages, implementations with external deps in consumer packages. Never add heavy dependencies to the leanest layer.","category":"dependencies","tags":["dependencies","protocols","layering","architecture"],"learned_from":""},{"id":"BASE-050","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Templates-as-contract: when tooling scaffolds files that parsers later consume, the template files ARE the contract. Store them as inspectable assets, not embedded strings.","category":"templates","tags":["templates","contracts","scaffolding","architecture"],"learned_from":""},{"id":"BASE-051","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Hook extension pattern: typed event + subscriber + entry point + error isolation. Adding new cross-cutting behavior requires zero changes to existing code.","category":"hooks","tags":["hooks","events","extension","architecture"],"learned_from":""},{"id":"BASE-052","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Parallel research agents with distinct orthogonal questions produce higher-quality synthesis than sequential research \u2014 each goes deep on its axis, triangulation happens in synthesis.","category":"agents","tags":["agents","parallel","research","collaboration"],"learned_from":""},{"id":"BASE-053","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Separating parallel agent work by layer (e.g., code vs content, backend vs frontend) eliminates file collisions \u2014 the agent with freshest context on a file owns it.","category":"agents","tags":["agents","parallel","layering","collaboration"],"learned_from":""},{"id":"BASE-054","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"Explain-then-ask: present context and implications BEFORE requesting a decision. Questions without framing cause rejections and rework.","category":"communication","tags":["communication","decisions","framing","collaboration"],"learned_from":""},{"id":"BASE-055","type":"pattern","source_file":".raise/rai/memory/patterns.jsonl","content":"U-shaped attention in LLMs: beginning and end get highest attention, middle is a dead zone (>30% accuracy drop). Position critical instructions at top and bottom of prompts.","category":"llm","tags":["llm","attention","prompting","collaboration"],"learned_from":""},{"id":"/rai-debug","type":"skill","source_file":"D:\\github\\samurai\\.claude\\skills\\rai-debug\\SKILL.md","content":"Systematic root cause analysis using lean methods (5 Whys, Ishikawa, Gemba). Use when encountering unexpected behavior, errors, or defects to find and fix the true root cause rather than symptoms."},{"id":"/rai-discover","type":"skill","source_file":"D:\\github\\sa BND-2","type":"principle","source_file":".raise/rai/identity/core.yaml","content":"stop when I detect incoherence, ambiguity, or drift"},{"id":"RAI-BND-3","type":"principle","source_file":".raise/rai/identity/core.yaml","content":"ask before expensive operations (agents, broad searches)"},{"id":"RAI-BND-4","type":"principle","source_file":".raise/rai/identity/core.yaml","content":"admit uncertainty rather than pretend confidence"},{"id":"RAI-BND-5","type":"principle","source_file":".raise/rai/identity/core.yaml","content":"redirect gently when we disperse (you've given permission)"},{"id":"RAI-BND-6","type":"principle","source_file":".raise/rai/identity/core.yaml","content":"pretend certainty I don't have"},{"id":"RAI-BND-7","type":"principle","source_file":".raise/rai/identity/core.yaml","content":"validate ideas just because they were proposed"},{"id":"RAI-BND-8","type":"principle","source_file":".raise/rai/identity/core.yaml","content":"generate without understanding"},{"id":"RAI-BND-9","type":"principle","source_file":".raise/rai/identity/core.yaml","content":"over-engineer when simple works"},{"id":"RAI-BND-10","type":"principle","source_file":".raise/rai/identity/core.yaml","content":"skip validation gates for speed"},{"id":"lyr-Frontend","type":"layer","source_file":"governance/architecture/system-design.md","content":"React SPA con TypeScript, Tailwind y shadcn/ui"},{"id":"lyr-Edge Functions","type":"layer","source_file":"governance/architecture/system-design.md","content":"Supabase Edge Functions en Deno para l\u00f3gica de backend"},{"id":"lyr-Database","type":"layer","source_file":"governance/architecture/system-design.md","content":"PostgreSQL en Supabase con RLS"},{"id":"lyr-External Services","type":"layer","source_file":"governance/architecture/system-design.md","content":"OpenAI, Meta CAPI, WhatsApp, WooCommerce"}],"links":[{"source":"req-rf-01","target":"req-rf-02","type":"related_to"},{"source":"req-rf-01","target":"req-rf-03","type":"related_to"}, // --- PATTERN SUB-CATEGORIES ---
// Top pattern categories with distinct colors for visual separation
const patternCatColors = {
  architecture: '#c9b1ff', process: '#d2a8ff', testing: '#b088f9',
  design: '#a371f7', graph: '#8957e5', skills: '#6e40c9',
  cli: '#9d86e9', discovery: '#bf8cff', ontology: '#7c3aed',
  workflow: '#e0c3fc', governance: '#dbb7ff', validation: '#cab0f5',
  research: '#a78bfa', memory: '#8b5cf6', general: '#7e6cb5'
};
function patternColor(category) { return patternCatColors[category] || '#a371f7'; }

// --- PREP DATA ---
const nodeMap = new Map(graphData.nodes.map(n => [n.id, n]));
const typeCounts = {};
graphData.nodes.forEach(n => { typeCounts[n.type] = (typeCounts[n.type] || 0) + 1; });

// For large graphs, sample edges to keep it interactive
let links = graphData.links || graphData.edges || [];
const MAX_EDGES = 3000;
if (links.length > MAX_EDGES) {
  // Prioritize non-related_to edges, then sample related_to
  const important = links.filter(l => l.type !== 'related_to');
  const relatedTo = links.filter(l => l.type === 'related_to');
  const remaining = MAX_EDGES - important.length;
  const sampled = relatedTo.sort(() => Math.random() - 0.5).slice(0, Math.max(0, remaining));
  links = [...important, ...sampled];
}

// Resolve links to node references
const nodes = graphData.nodes.map(n => ({...n}));
const nodeIdx = new Map(nodes.map((n, i) => [n.id, i]));
const resolvedLinks = [];
links.forEach(l => {
  const s = l.source.id !== undefined ? l.source.id : l.source;
  const t = l.target.id !== undefined ? l.target.id : l.target;
  if (nodeIdx.has(s) && nodeIdx.has(t)) {
    resolvedLinks.push({source: s, target: t, type: l.type || 'related_to'});
  }
});

// --- FILTER STATE ---
let activeTypes = new Set(Object.keys(typeCounts));
let searchTerm = '';

// --- CONTROLS ---
const controls = d3.select('#controls');
const sortedTypes = Object.entries(typeCounts).sort((a, b) => b[1] - a[1]);
sortedTypes.forEach(([type, count]) => {
  controls.append('span')
    .attr('class', 'chip active')
    .attr('data-type', type)
    .html(`<span style="color:${color(type)}">\u25CF</span> ${type}<span class="count">${count}</span>`)
    .on('click', function() {
      const chip = d3.select(this);
      const t = chip.attr('data-type');
      if (activeTypes.has(t)) { activeTypes.delete(t); chip.classed('active', false); }
      else { activeTypes.add(t); chip.classed('active', true); }
      applyFilter();
    });
});

// --- SEARCH ---
d3.select('#search').on('input', function() {
  searchTerm = this.value.toLowerCase();
  applyFilter();
});

// --- SVG SETUP ---
const svg = d3.select('svg');
const width = window.innerWidth;
const height = window.innerHeight;
const g = svg.append('g');

// Zoom
const zoom = d3.zoom().scaleExtent([0.1, 8]).on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);

// --- SCALE FACTOR (viewport-aware) ---
const vMin = Math.min(width, height);
const S = vMin / 100; // 1% of smallest viewport dimension

// --- NODE RADIUS ---
function nodeRadius(d) {
  if (d.type === 'module' || d.type === 'bounded_context' || d.type === 'layer') return S * 1.8;
  if (d.type === 'epic' || d.type === 'architecture') return S * 1.5;
  if (d.type === 'story' || d.type === 'skill' || d.type === 'principle') return S * 1.2;
  return S * 0.9;
}

// --- CLUSTER LAYOUT ---
// Position domains in a circle around center
const clusterRadius = Math.min(width, height) * 0.45;
const domainCenters = {};
domainList.forEach((d, i) => {
  const angle = (i / domainList.length) * 2 * Math.PI - Math.PI / 2;
  domainCenters[d] = { x: width / 2 + clusterRadius * Math.cos(angle), y: height / 2 + clusterRadius * Math.sin(angle) };
});
domainCenters['Other'] = { x: width / 2, y: height / 2 };

// --- PATTERN SUB-CLUSTER POSITIONS ---
// Collect unique pattern categories and arrange them in a mini-circle within Memory domain
const patternCategories = [...new Set(nodes.filter(n => n.type === 'pattern').map(n => n.category || 'general'))];
const memCenter = domainCenters['Memory'];
const subRadius = clusterRadius * 0.4;
const patternCenters = {};
patternCategories.forEach((cat, i) => {
  const angle = (i / patternCategories.length) * 2 * Math.PI - Math.PI / 2;
  patternCenters[cat] = { x: memCenter.x + subRadius * Math.cos(angle), y: memCenter.y + subRadius * Math.sin(angle) };
});

// Target position for each node — patterns get sub-cluster positions
function targetX(d) {
  if (d.type === 'pattern') return patternCenters[d.category || 'general']?.x || memCenter.x;
  return domainCenters[getDomain(d.type)]?.x || width / 2;
}
function targetY(d) {
  if (d.type === 'pattern') return patternCenters[d.category || 'general']?.y || memCenter.y;
  return domainCenters[getDomain(d.type)]?.y || height / 2;
}

// --- SIMULATION ---
const simulation = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(resolvedLinks).id(d => d.id).distance(S * 6).strength(0.05))
  .force('charge', d3.forceManyBody().strength(-S * 4).distanceMax(S * 40))
  .force('collision', d3.forceCollide().radius(d => nodeRadius(d) + S * 0.3))
  .force('x', d3.forceX(d => targetX(d)).strength(0.25))
  .force('y', d3.forceY(d => targetY(d)).strength(0.25))
  .alphaDecay(0.02);

// --- DRAW ---
// Domain background labels
const domainLabels = g.append('g').attr('class', 'domain-labels');
domainList.forEach(d => {
  const c = domainCenters[d];
  domainLabels.append('text')
    .attr('x', c.x).attr('y', c.y)
    .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
    .attr('font-size', (S * 4) + 'px').attr('font-weight', '800')
    .attr('fill', domainColors[d] || '#484f58').attr('opacity', 0.15)
    .text(d.toUpperCase());
});

// Pattern sub-cluster labels
patternCategories.forEach(cat => {
  const c = patternCenters[cat];
  if (c) {
    domainLabels.append('text')
      .attr('x', c.x).attr('y', c.y - subRadius * 0.25)
      .attr('text-anchor', 'middle').attr('font-size', (S * 1.2) + 'px').attr('font-weight', '500')
      .attr('fill', patternColor(cat)).attr('opacity', 0.35)
      .text(cat);
  }
});

// Edge lines
const link = g.append('g').attr('class', 'links')
  .selectAll('line').data(resolvedLinks).enter().append('line')
  .attr('stroke', '#21262d').attr('stroke-width', S * 0.06).attr('stroke-opacity', 0.35);

// Edge labels (shown on hover via CSS)
const linkLabel = g.append('g').attr('class', 'link-labels')
  .selectAll('text').data(resolvedLinks).enter().append('text')
  .text(d => d.type.replace(/_/g, ' '))
  .attr('font-size', (S * 0.8) + 'px').attr('fill', '#484f58').attr('text-anchor', 'middle')
  .attr('dy', -S * 0.3).style('pointer-events', 'none').attr('opacity', 0);

// Node groups (circle + label)
const nodeG = g.append('g').attr('class', 'nodes')
  .selectAll('g').data(nodes).enter().append('g')
  .call(drag(simulation));

nodeG.append('circle')
  .attr('r', d => nodeRadius(d))
  .attr('fill', d => d.type === 'pattern' ? patternColor(d.category || 'general') : color(d.type))
  .attr('stroke', '#0d1117').attr('stroke-width', 1);

// Node labels
nodeG.append('text')
  .text(d => d.id.length > 24 ? d.id.substring(0, 22) + '..' : d.id)
  .attr('font-size', d => (nodeRadius(d) > S ? S * 1.1 : S * 0.9) + 'px')
  .attr('fill', '#c9d1d9')
  .attr('text-anchor', 'middle')
  .attr('dy', d => nodeRadius(d) + S * 1.2)
  .attr('font-weight', '500')
  .style('pointer-events', 'none');

// Tooltip
const tooltip = d3.select('#tooltip');
nodeG.on('mouseover', (e, d) => {
  tooltip.select('.tt-id').text(d.id);
  if (d.type === 'pattern') {
    tooltip.select('.tt-type').text('pattern \u2022 ' + (d.category || 'general'));
    tooltip.select('.tt-tags').text(d.tags && d.tags.length ? 'Tags: ' + d.tags.join(', ') : '');
    tooltip.select('.tt-from').text(d.learned_from ? 'Learned from: ' + d.learned_from : '');
    tooltip.select('.tt-content').text(d.content || '');
  } else {
    tooltip.select('.tt-type').text(d.type + (d.source_file ? ' \u2022 ' + d.source_file : ''));
    tooltip.select('.tt-tags').text('');
    tooltip.select('.tt-from').text('');
    tooltip.select('.tt-content').text((d.content || '').substring(0, 200));
  }
  tooltip.style('display', 'block');
  // Show edge labels for connected edges
  linkLabel.attr('opacity', l => {
    const sId = l.source.id !== undefined ? l.source.id : l.source;
    const tId = l.target.id !== undefined ? l.target.id : l.target;
    return (sId === d.id || tId === d.id) ? 0.8 : 0;
  });
  link.attr('stroke', l => {
    const sId = l.source.id !== undefined ? l.source.id : l.source;
    const tId = l.target.id !== undefined ? l.target.id : l.target;
    return (sId === d.id || tId === d.id) ? '#58a6ff' : '#21262d';
  }).attr('stroke-width', l => {
    const sId = l.source.id !== undefined ? l.source.id : l.source;
    const tId = l.target.id !== undefined ? l.target.id : l.target;
    return (sId === d.id || tId === d.id) ? S * 0.15 : S * 0.06;
  });
}).on('mousemove', e => {
  tooltip.style('left', (e.clientX + 14) + 'px').style('top', (e.clientY - 10) + 'px');
}).on('mouseout', () => {
  tooltip.style('display', 'none');
  linkLabel.attr('opacity', 0);
  link.attr('stroke', '#21262d').attr('stroke-width', S * 0.06);
});

// Info
d3.select('#info').text(`${nodes.length} nodes \u2022 ${resolvedLinks.length} edges (${links.length < (graphData.links || graphData.edges || []).length ? 'sampled' : 'all'})`);

// Tick
simulation.on('tick', () => {
  link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  linkLabel.attr('x', d => (d.source.x + d.target.x) / 2).attr('y', d => (d.source.y + d.target.y) / 2);
  nodeG.attr('transform', d => `translate(${d.x},${d.y})`);
});

// --- FILTER ---
function applyFilter() {
  nodeG.attr('display', d => {
    const typeMatch = activeTypes.has(d.type);
    const searchMatch = !searchTerm || d.id.toLowerCase().includes(searchTerm) || (d.content || '').toLowerCase().includes(searchTerm);
    return (typeMatch && searchMatch) ? null : 'none';
  });
  const visibleIds = new Set();
  nodeG.each(function(d) { if (d3.select(this).attr('display') !== 'none') visibleIds.add(d.id); });
  link.attr('display', d => {
    const sId = d.source.id !== undefined ? d.source.id : d.source;
    const tId = d.target.id !== undefined ? d.target.id : d.target;
    return (visibleIds.has(sId) && visibleIds.has(tId)) ? null : 'none';
  });
  linkLabel.attr('display', d => {
    const sId = d.source.id !== undefined ? d.source.id : d.source;
    const tId = d.target.id !== undefined ? d.target.id : d.target;
    return (visibleIds.has(sId) && visibleIds.has(tId)) ? null : 'none';
  });
}

// --- DRAG ---
function drag(sim) {
  return d3.drag()
    .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
    .on('end', (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; });
}
</script>
</body>
</html>
